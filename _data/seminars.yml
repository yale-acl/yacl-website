  - date: "2026-04-03"
    speaker: "Aadityan Ganesh"
    affiliation: "Princeton"
    title: "Characterizing Off-Chain Influence Proof Transaction Fee Mechanisms"
    video_url: "https://youtu.be/8hruRzaM-Gk"
    abstract: "Roughgarden (2020) initiates the study of Transaction Fee Mechanisms (TFMs), and posits that the on-chain game of a ``good'' TFM should be on-chain simple (OnCS), i.e., incentive compatible for users and the miner. Recent work of Ganesh, Thomas and Weinberg (2024) posits that they should additionally be Off-Chain Influence Proof (OffCIP), which means that the miner cannot achieve any additional revenue by separately conducting an off-chain auction to determine on-chain inclusion. They observe that a cryptographic second-price auction satisfies both properties, but leave open the question of whether other mechanisms (e.g, non-cryptographic) satisfy these properties. In this paper, we characterize OffCIP TFMs: They are those satisfying a burn identity relating the burn rule to the allocation rule. In particular, we show that auction is OffCIP if and only if its (induced direct-revelation) allocation rule Xˉ(⋅) and burn rule Bˉ(⋅) (both of which take as input users' values v1,…,vn) are truthful when viewing (Xˉ(⋅),Bˉ(⋅)) as the allocation and pricing rule of a multi-item auction for a single additive buyer with values (φ(v1),…,φ(vn)) equal to the users' virtual values. Building on this burn identity, we characterize deterministic OffCIP and OnCS TFMs that do not use cryptography: They are posted-price mechanisms with specially-tuned burns. As a corollary, we show that such TFMs can only exist with infinite supply and prior-dependence. However, we show that for randomized TFMs, there are additional OnCS and OffCIP auctions that do not use cryptography (even when there is finite supply, under prior-dependence with a bounded prior distribution). Holistically, our results show that while OffCIP is a fairly stringent requirement, families of OffCIP mechanisms can be found for a variety of settings."
    bio: "Aadityan Ganesh is a third year PhD student in the CS department at Princeton University, advised by Prof. Matt Weinberg. He is generally interested in algorithmic game theory, particularly in understanding the incentives of rational actors in decentralized platforms ."
  - date: "2026-03-27"
    speaker: "Zachary Feinstein"
    affiliation: "Stevens Institute of Technology"
    title: "Systemic Resilience and Autarkic Derivatives: Engineering Oracle-Independent Risk Primitives in DeFi"
    video_url: "https://youtu.be/2_57Gqod0EE"
    abstract: "Financial options are fundamental to traditional markets, enabling strategies ranging from hedging to speculating. Yet, while the Automated Market Maker paradigm has established a standard for decentralized spot markets, no equivalent standard has emerged for on-chain options. Current designs typically attempt to replicate centralized exchange mechanics, creating a \"liveness trap\" that requires high-frequency oracles and robust liquidation engines which may fail during stress events. In this presentation, we introduce a design for amortizing perpetual options engineered for the operational and adversarial constraints of blockchain environments. By treating these derivatives as autarkic primitives (contracts that maintain solvency regardless of external data or actor liveness), we propose a decentralized market framework with minimal consistency requirements. We demonstrate how this primitive functions as a foundational risk primitive for DeFi, enabling applications such as endogenous collateralization and explicitly priced de-peg insurance. Ultimately, we show that this design provides a mechanism for mutualizing tail risk without reliance on centralized clearing institutions or real-time oracles."
    bio: "Dr. Zachary Feinstein is an Associate Professor in the School of Business at Stevens Institute of Technology. He serves as the Director of the FinTech Certificate and Co-Directors of the Doctoral Programs in the School of Business at Stevens Institute and is the Secretary/Treasurer for the INFORMS Section on Finance. Prior to joining Stevens Institute, Dr. Feinstein earned his Ph.D. from Princeton University in 2014 and was a faculty member at Washington University in St. Louis from 2014-2019. He has published numerous works in financial systemic risk, decentralized finance, and machine learning. Dr. Feinstein has written multiple articles on financial topics related to popular fiction; these works have been highlighted on Bloomberg TV, the New York Times, and the Wall Street Journal among many other prominent news outlets."
  - date: "2026-02-27"
    speaker: "Paul Gerhart"
    affiliation: "TU Wien"
    title: "Theory and Applications of Adaptor Signatures"
    video_url: "https://youtu.be/Urg3hkQdHSM"
    links:
      - "https://eprint.iacr.org/2024/1809.pdf"
      - "https://eprint.iacr.org/2025/388.pdf"
      - "https://eprint.iacr.org/2025/1363.pdf"
    abstract: "Adaptor signatures have become a widely used cryptographic tool in decentralized systems, with applications ranging from payment channels and coin mixing to oracle-based and fair exchange protocols. At a high level, they extend digital signatures by enabling publicly verifiable pre-signatures that hide a valid signature and bind its completion to the revelation of a witness. The goal of this talk is to equip the audience with the intuition needed to use adaptor signatures correctly in real-world decentralized systems. We discuss which security properties are crucial when adaptor signatures are used as components of larger protocols, highlight common pitfalls, and demonstrate how seemingly reasonable constructions or definitions can lead to subtle vulnerabilities. Finally, we give an overview of threshold adaptor signatures and explain how they extend adaptor-based protocols to multi-party and decentralized governance settings."
    bio: "Paul is a final-year PhD student in cryptography at TU Wien, working under the supervision of Dominique Schröder. His research focuses on the design and analysis of advanced cryptographic protocols. In particular, advanced signatures, partially-oblivious pseudorandom functions (PoPRFs), and password-based cryptography."
  - date: "2026-02-25"
    speaker: "Orestis Alpos"
    affiliation: "Common Prefix"
    title: "Censorship-Resistant Sealed-Bid Auctions on Blockchains"
    video_url: "https://youtu.be/ZorgH2LIS1s"
    abstract: "Traditional commit-and-reveal mechanisms have been used to realize sealed-bid on-chain auctions. However, these leak timing information, impose inefficient participation costs -- the inclusion fee to be paid for adding the transaction on-chain -- and also require multiple slots to execute the auction. Recent research investigates single-slot auctions; however, it requires a high threshold of honest parties. We present a protocol that addresses these issues. Our design combines timestamp-based certificates with censorship resistance through inclusion lists. The resulting protocol satisfies four properties, the first being a strong hiding property which consists of Value Indistinguishability, Existential Obfuscation and User Obfuscation. This not only ensures that the adversary cannot differentiate between two value of bids (as the previously defined Hiding property does in Pranav et al. [MCP]), but also that the very existence of a bid and the identity of the bidder remain obfuscated. The second property is Short-Term Censorship Resistance, ensuring that, if the underlying blockchain outputs a block, then the auction would contain bids from all honest users. The third is a new property we introduce, Auction Participation Efficiency (APE), that measures how closely on-chain outcomes resemble classical auctions in terms of costs for participating users. And the fourth property is No Free Bid Withdrawal, which disallows committed bids from being withdrawn in case the bidder changes its mind. Together, these properties yield a fair, private, and economically robust auction primitive that can be integrated into any blockchain to support secure and efficient auction execution."
    bio: "Orestis is a blockchain consultant at Common Prefix, where he does research, consulting, and engineering on blockchains and applied cryptography. Prior to that he briefly worked at DFNS, building on threshold ECDSA and threshold key management protocols, and at IBM Research Zurich, building scalable large-scale consensus protocols. He obtained his PhD at the Crypto group of the University of Bern, where he had the privilege to be advised by Prof. Christian Cachin. His PhD thesis was on Distributed Protocols with Threshold and General Trust Assumptions. His research interests lie in the fields of distributed systems and applied cryptography, bridging theory and practice."
  - date: "2026-02-20"
    speaker: "Christof Paar"
    affiliation: "Max Planck Institute"
    title: "Cybersecurity Beyond Software and Hardware"
    video_url: "https://youtu.be/4K2RJvd2VCg"
    abstract: "Classical physical-layer security (PLS) has been studied for nearly half a century. In the past, the main objective had been to realize information-theoretically secure communication. Yet, those schemes haven't gained much practical relevance. We argue that it is more promising to apply PLS to problems for which there is no solution using digital-only schemes. In this talk we will look at a pretty wild application for such a PLS solution. A vexing problem in nuclear disarmament agreements is the secure remote monitoring of nuclear warheads in storage. In collaboration with Princeton's School of Public and International Affairs, we have developed an entirely new approach. Our solution is a special instance of a virtual-proof-of-reality scheme, based on radio-frequency signals. The basic idea is to build a challenge-and-response protocol -- which are widely used in cryptography, e.g., for authentication in mobile communication -- based on wireless technology."
    bio: "Christof Paar is co-founding director of the Max Planck Institute for Security and Privacy in Bochum, Germany, and is research professor at UMass Amherst. His research interests include hardware security, applied cryptography and physical-layer security. At WPI, he co-founded CHES, the Conference on Cryptographic Hardware and Embedded Systems, and is co-spokesperson of the Cluster of Excellence \"CASA – Securing the Digital Society\" (financed by DFG, the \"German NSF\"). He is Fellow of the IEEE and the IACR and has given invited talks at Cambridge, Harvard, MIT, Oxford, Stanford and Yale."
  - date: "2026-02-13"
    speaker: "Yinxi Liu"
    affiliation: "RIT"
    title: "Detecting Smart Contract State-Inconsistency Bugs via Flow Divergence and Multiplex Symbolic Execution"
    video_url: "https://youtu.be/gD0NVcS8Bfo"
    links:
      - "https://doi.org/10.1145/3715712"
    abstract: "Ethereum smart contracts determine state transition results not only by the previous states, but also by a mutable global state consisting of storage variables. This has resulted in state-inconsistency bugs, which grant an attacker the ability to modify contract states either through recursive function calls to a contract (reentrancy), or by exploiting transaction order dependence (TOD). Current studies have determined that identifying data races on global storage variables can capture all state-inconsistency bugs. Nevertheless, eliminating false positives poses a significant challenge, given the extensive number of execution paths that could potentially cause a data race. For simplicity, existing research considers a data race to be vulnerable as long as the variable involved could have inconsistent values under different execution orders. However, such a data race could be benign when the inconsistent value does not affect any critical computation or decision-making process in the program. Besides, the data race could also be infeasible when there is no valid state in the contract that allows the execution of both orders. In this paper, we aim to appreciably reduce these false positives without introducing false negatives. We present DivertScan, a precise framework to detect exploitable state-inconsistency bugs in smart contracts. We first introduce the use of flow divergence to check where the involved variable may flow to. This allows DivertScan to precisely infer the potential effects of a data race and determine whether it can be exploited for inducing unexpected program behaviors. We also propose multiplex symbolic execution to examine different execution orders in one time of solving. This helps DivertScan to determine whether a common starting state could potentially exist. To address the scalability issue in symbolic execution, DivertScan utilizes an overapproximated pre-checking and a selective exploration strategy. As a result, it only needs to explore a limited state space. DivertScan significantly outperformed state-of-the-art tools by improving the precision rate by 20.72% to 74.93% while introducing no false negatives. It also identified five exploitable real-world vulnerabilities that other tools missed. The detected vulnerabilities could potentially lead to a loss of up to $68.2M, based on trading records and rate limits ."
    bio: "Yinxi Liu is an Assistant Professor in the Department of Cybersecurity at Rochester Institute of Technology, where she is affiliated with the Global Cybersecurity Institute and participates as a faculty member in the Computing and Information Sciences Ph.D. program. She received her Ph.D. degree in Computer Science and Engineering from The Chinese University of Hong Kong. She aims to ignite a beacon for vulnerability discovery in the sea of program states and execution paths. Her research provides (in)formal models of undesirable behaviors in various programs, significantly reducing the complexities involved in analyzing these programs for certain security risks. This leads to a broad array of related topics in computer security, programming languages, software engineering, and algorithms & complexity, such as security audit, program analysis, test-input generation, and worst-case complexity of algorithms."
  - date: "2026-02-06"
    speaker: "Harjasleen Malvai"
    affiliation: "UIUC"
    title: "Building Private, Secure and Transparent Digital Identity at Scale"
    video_url: "https://youtu.be/7yzhZMrfr3s"
    abstract: "Digital identity controls access to many everyday essentials, from getting paid to accessing banking and benefits, and sits in the critical path of modern security. Even end-to-end encrypted messaging depends on authentic cryptographic identity, i.e., a trustworthy way to learn the cryptographic keys needed to encrypt messages to the right person. In practice, centralized identity providers become both a single point of failure and a single point of control: they decide what assertions are supported, and their compromise or coercion enables targeted attacks that are hard to detect. Yet, many strong proposals assume new ecosystems or significant user effort – assumptions that don’t hold for the systems and users we have today.My thesis is that it is possible to make identity infrastructure more private, secure, and transparent at scale while designing for existing user and ecosystem constraints. I’ll present two case studies across the identity lifecycle.First, I’ll discuss key transparency for end-to-end encrypted messaging: how to make centralized key directories auditable so that even a compromised server cannot quietly swap keys for targeted users. I’ll show how this line of work evolved from formal privacy and history guarantees (SEEMless) to a billion-user architecture (Parakeet) built for real operational constraints (such as distributed storage and long time horizons), which now underpins the key transparency deployments in WhatsApp and Facebook Messenger.Second, I’ll briefly describe credential bootstrapping with accountability (CanDID): a path to establishing privacy-preserving credentials from existing web sources without assuming a fully mature verifiable-credential ecosystem, while supporting practical requirements like revocation, recovery, and compliance checks. I’ll close by highlighting ongoing work and open problems motivated by these systems and sketch a research agenda for building auditable and privacy-preserving infrastructure at internet scale, for identity and beyond."
    bio: "Harjasleen (Jasleen) Malvai is a final-year PhD student at UIUC, working with Prof. Andrew Miller. At the moment, she is visiting Prof. Babis Papamanthou at Yale. Her research develops the cryptographic and systems foundations for verifiable and privacy-preserving identity infrastructure. She designs protocols and proofs that make large-scale transparency and accountability possible without compromising privacy—both drawing on and advancing tools such as authenticated data structures, memory checking, and zero-knowledge proofs. Her approach combines traditional applied cryptography with decentralized systems, using tools such as SNARKs and MPC to design protocols that are both rigorous and deployable. Her work spans both theory and practice, from lower bounds for authenticated dictionaries to deployed systems such as Parakeet (used by WhatsApp, awarded the IETF Applied Networking Research Prize), and CanDID,whose component DECO protocol was acquired by Chainlink Labs ."
  - date: "2026-01-30"
    speaker: "Somiya Singh Chhillar"
    affiliation: "GMU"
    title: "Exposing Privacy Risks in Anonymizing Clinical Data: Combinatorial Refinement Attacks on k-Anonymity Without Auxiliary Information"
    video_url: "https://youtu.be/pHeXFVl9NgE"
    links:
      - "https://dl.acm.org/doi/10.1145/3719027.3765139"
    abstract: "This talk presents recent work on exposing privacy risks in medical data anonymized according to regulatory standards. We show how sensitive information can be inferred about k-anonymized data even without auxiliary knowledge and present a new class of attack called combinatorial refinement attack."
    bio: "Somiya is a Ph.D. student in Computer Science at George Mason University, where he works with Professor Evgenios Kornaropoulos in the Encrypted Systems group. His research focuses on privacy and on security of machine learning models with an emphasis on membership inference attacks. He is particularly interested in bridging classical privacy notions with modern machine learning systems."
  - date: "2026-01-23"
    speaker: "Aayush Yadav"
    affiliation: "GMU"
    title: "Non-interactive Protocols for Secure and Anonymous Web-browsing"
    video_url: "https://youtu.be/QHKYtja_WNU"
    abstract: "Anonymous tokens are a powerful primitive that allow honest users to access a web resource or service securely while maintaining anonymity. They have found several applications, such as in Cloudflare’s Privacy Pass, Google’s Private State Tokens, and Apple’s Private Cloud Compute. In a typical anonymous token (AT) system, a user wishing to access some web resource, will request a token from an authorized AT issuer who, after performing necessary checks, furnishes said token. A crucial security property of AT is the unlinkability of a token to its corresponding issuance session and, by extension, to the requesting user even by the issuer. Thus, the user can anonymously present its token to a third-party resource server along with its request and the server is assured of the trustworthiness of the user. It was shown by Hanzlik (Eurocrypt '23) that a non-interactive protocol exists for many such modern AT applications that satisfy a simple property. Non-interactivity greatly improves the application experience by allowing for optimal round-trip time for user requests through offline pre-computation of tokens. The overarching theme of my talk is the non-interactive issuance of anonymous tokens. More specifically, with an eye towards application(s), I will present (i) a recent result on non-interactive and threshold issuance of anonymous tokens (Baldimtsi, Hanzlik and Yadav) from PS signatures (Pointcheval and Sanders; CT-RSA '16); and (ii) an extension of the non-interactive anonymous tokens that introduces additional user accountability via secret flags embedded into the token (Baldimtsi, Hanzlik, Nguyen and Yadav; ePrint: 2025/430) ."
    bio: "Aayush Yadav is a PhD candidate in Computer Science at George Mason University where he is advised by Foteini Baldimtsi. Since 2023, he has also been a visiting fellow at the University of Wisconsin, Madison. His work focuses on designing practically efficient cryptographic protocols that address the dual concerns of privacy and accountability, with a particular emphasis on blind signature schemes, authentication schemes, zero-knowledge proof systems and threshold cryptosystems."
  - date: "2026-01-16"
    speaker: "Nikhil Vanjani"
    affiliation: "CMU"
    title: "Functional Fair Exchange: Beyond All-or-Nothing Data Exchange"
    video_url: "https://youtu.be/EN0SaVEMOao"
    abstract: "Fair exchange traditionally treats digital goods as all-or-nothing objects: either the buyer gets everything, or nothing at all. In many modern settings, however, this model is too restrictive. A seller may hold sensitive data (e.g., patient records, signing key), while a buyer is only interested in learning the output of a specific computation on that data (e.g., aggregate statistic, fine-tuning ML model, digital signature) without learning anything else. In this talk, I will present Functional Fair Exchange as a generalization of fair exchange that captures this setting. The goal is to ensure that the buyer learns exactly the agreed-upon function output if and only if the seller gets paid. I will first highlight shortcomings of existing techniques such as smart-contracts and adaptor signatures for achieving fairness, privacy, and efficiency simultaneously. I will then describe two protocols for achieving Functional Fair Exchange based on functional encryption and fully-homomorphic encryption. The first supports efficient exchange of linear functions, enabling practical sales of statistics and aggregates with strong privacy guarantees. The second significantly broadens the scope to higher-degree computations, enabling richer analytics and machine-learning workloads while improving performance even in simpler cases. Together, these results show both the feasibility and efficiency of protocols for achieving functional fair exchange."
    bio: "Nikhil Vanjani recently completed his Ph.D. from Carnegie Mellon University, advised by Elaine Shi. His research lies at the intersection of applied and theoretical cryptography, with a focus on functional encryption and its applications to decentralized systems. He received his B.Tech. from IIT Kanpur and his M.S. from CMU."
  - date: "2025-11-21"
    speaker: "Harjasleen Malvai"
    affiliation: "UIUC"
    title: "Memory Accesses for SNARKs and Constraint-Friendly Map-to-Elliptic-Curve-Group Relations"
    video_url: "https://youtu.be/QJ-qBYci3m8"
    abstract: "This talk will be divided into two parts. Part I: Memory Access Solutions for SNARKs. In this part of the talk, I will motivate the unique challenge of RAM for SNARK programming and provide an overview of the different techniques used to address it. This serves to motivate the second part of the talk and introduce all of our audience to the need for a constraint efficient map-to-elliptic-curve primitive. Part II: Constraint-Friendly Map-to-Elliptic-Curve-Group Relations and Their Applications. Hashing to elliptic curve groups is a fundamental operation used in many cryptographic applications, including multiset hashing and BLS signatures. With the recent rise of zero-knowledge applications, they are increasingly used in constraint programming settings. For example, multiset hashing enables memory consistency checks in zkVMs, while BLS signatures are used in proof of stake protocols. In such cases, it becomes critical for hash-to-elliptic-curve-group constructions to be constraint-friendly such that one can efficiently generate succinct proofs of correctness. However, existing constructions rely on cryptographic hash functions that are expensive to represent in arithmetic constraint systems, resulting in high proving costs. We propose a constraint-efficient alternative: a map-to-elliptic-curve-group relation that bypasses the need for cryptographic hash functions and can serve as a drop-in replacement for hash-to-curve constructions in practical settings, including the aforementioned applications. Our relation naturally supports non-deterministic map-to-curve choices making them more efficient in constraint programming frameworks and enabling efficient integration into zero-knowledge proofs. We formally analyze the security of our approach in the elliptic curve generic group model (EC-GGM). Our implementation in Noir/Barretenberg demonstrates the efficiency of our construction in constraint programming: it achieves over 20x fewer constraints than the best hash-to-elliptic-curve-group alternatives, and enables 50-100x faster proving times at scale."
    bio: "Harjasleen (Jasleen) Malvai is a final-year PhD student at UIUC, working with Prof. Andrew Miller. At the moment, she is visiting Prof. Babis Papamanthou at Yale. Her research develops the cryptographic and systems foundations for verifiable and privacy-preserving identity infrastructure. She designs protocols and proofs that make large-scale transparency and accountability possible without compromising privacy—both drawing on and advancing tools such as authenticated data structures, memory checking, and zero-knowledge proofs. Her approach combines traditional applied cryptography with decentralized systems, using tools such as SNARKs and MPC to design protocols that are both rigorous and deployable. Her work spans both theory and practice, from lower bounds for authenticated dictionaries to deployed systems such as Parakeet (used by WhatsApp, awarded the IETF Applied Networking Research Prize), and CanDID,whose component DECO protocol was acquired by Chainlink Labs."
  - date: "2025-11-14"
    speaker: "Jhonatan Tavori"
    affiliation: "Columbia University"
    title: "Exploiting Miscoordination of Microservices in Cloud Applications by DDoS Attacks"
    links:
      - "https://doi.org/10.1109/INFOCOM52122.2024.10621335"
      - "https://jhonatantavori.github.io"
    abstract: "The delay and throttling (service-blocking) experienced by users are critical measures of quality-of-service in cloud-based services. To maintain their functionality, service providers allocate substantial budgets to cloud infrastructure for their services. In this talk, we examine loosely-coupled components within a request's journey through a cloud-based service. Numerous cloud systems are now constructed using loosely connected services. Each of these services is tasked with a specific function and is characterized by distinct scaling attributes. We observe that when microservices which utilize separate auto-scaling mechanisms operate in tandem to process traffic, they may perform ineffectively, especially under overload conditions, due to DDoS attacks. This can result in throttling and over-provisioning of resources (Economic Denial of Sustainability – EDoS). We further demonstrate how an attacker can exploit the tandem behavior to initiate effective DDoS attacks, causing service providers to incur charges for requests that fail to be serviced. Joint work with Anat Bremler-Barr, Michael Czeizler and Hanoch Levy (IEEE INFOCOM 2024) ."
    bio: "Jhonatan Tavori is a Fulbright Postdoctoral Fellow and a Zuckerman STEM Leadership Scholar at Columbia University. He received the Ph.D. degree in Computer Science from Tel Aviv University in 2025, advised by Prof. Hanoch Levy. His research interests revolve around stochastic network analysis and security, DDoS attacks on microservices-based applications, and edge-cloud systems resilience. Recently, he was recognized with the Blavatnik Prize for Outstanding Doctoral Fellows in Computer Science and the EU Horizon’s Next Generation Internet Fellowship."
  - date: "2025-11-07"
    speaker: "Jesko Dujmovic"
    affiliation: "Northeastern University and Boston University"
    title: "When Simple Permutations Mix Poorly: Limited Independence Does Not Imply Pseudorandomness"
    video_url: "https://youtu.be/Qx3sfTVwrGk"
    abstract: "Over the past two decades, several works have used (almost) $k$-wise independence as a proxy property for block ciphers, since it guarantees resistance against broad classes of statistical attacks. For example, even the case $k = 2$ already implies security against differential and linear cryptanalysis. Hoory, Magen, Myers, and Rackoff (ICALP ’04; TCS ’05) formulated an appealing conjecture: if the sequential composition of $T$ independent local randomized permutations is (close to) four-wise independent, then it should also be a pseudorandom permutation. Here, ``local'' means that each output bit depends on only a constant number of input bits. This conjecture offers a potential strong justification for analyses of block ciphers that establish (almost) $k$-wise independence of this type of constructions. In this work, we disprove the conjecture in full generality by presenting an explicit local randomized permutation whose sequential composition is four-wise independent, but not a pseudorandom permutation. Our counterexample in fact extends to $k$-wise independence for any constant~$k$."
    bio: "Jesko Dujmovic is a PostDoc at Northeastern University and Boston University with Daniel Wichs and Ran Canetti. He did his PhD with Nico Döttling at CISPA. He conducts research in cryptography and has published on SNARGs, Registration-Based Encryption, Space-Hard cryptography, Timelock-Puzzles, and 2PC."
  - date: "2025-10-31"
    speaker: "Sarisht Wadhwa"
    affiliation: "Duke University"
    title: "Security of Blockchains with Strategic Players"
    video_url: "https://youtu.be/Wp64XUVoLnw"
    abstract: "Blockchains face two fundamental and intertwined challenges: censorship, characterized by the selective exclusion of transactions, and strategic manipulation of transaction ordering. This talk examines the deep connection between these two issues and highlights the inherent limitations of purely cryptographic approaches in mitigating them. I will then explore the underlying economic mechanisms that give rise to such vulnerabilities and present the design of Auction-Based Inclusion Lists (AUCIL)-- a protocol that achieves robustness against bribery-based attacks and provides a promising pathway toward censorship resistance in blockchain systems."
    bio: "Sarisht is a Ph.D. candidate in Computer Science at Duke University, advised by Prof. Kartik Nayak and Prof. Fan Zhang. His research lies at the intersection of consensus and game theory, with a focus on designing secure and incentive-compatible blockchain protocols. His work explores questions of censorship resistance, transaction fee mechanisms, and mechanism design for decentralized systems. His broader research aims to formalize and resolve fundamental incentive and efficiency challenges in blockchain infrastructure."
  - date: "2025-10-24"
    speaker: "Mahimna Kelkar"
    affiliation: "Columbia University and Offchain Labs"
    title: "Breaking Omertà: On Threshold Cryptography, Smart Collusion, and Whistleblowing"
    video_url: "https://youtu.be/3p0vXMVcuj4"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
      - "https://ia.cr/2025/1582"
    abstract: "Cryptographic protocols often make honesty assumptions---e.g., fewer than $t$ out of $n$ participants are adversarial. In practice, these assumptions can be hard to ensure, particularly given monetary incentives for participants to collude and deviate from the protocol. In this work, we explore combining techniques from cryptography and mechanism design to discourage collusion. We formalize protocols in which colluders submit a cryptographic proof to whistleblow against their co-conspirators, revealing the dishonest behavior publicly. We provide general results on the cryptographic feasibility and show how whistleblowing fits a number of applications including secret sharing, randomness beacons, and anonymous credentials. We also introduce smart collusion---a new model for players to collude. Analogous to blockchain smart contracts, smart collusion allows colluding parties to arbitrarily coordinate and impose penalties on defectors (e.g., those that blow the whistle). We show that unconditional security is impossible against smart colluders even when whistleblowing is anonymous and can identify all colluding players. On the positive side, we construct a whistleblowing protocol that requires only a small deposit and can protect against smart collusion even with roughly $t$ times larger deposit ."
    bio: "Mahimna Kelkar is a CS postdoc at Columbia University affiliated with the Columbia-Ethereum Research Center. His research interests are broadly in applied cryptography, and the foundations of security for blockchains. He recently completed his PhD at Cornell University advised by Ari Juels. In Fall 2026, he will start as an Assistant Professor of Computer Science at Purdue University."
  - date: "2025-10-10"
    speaker: "Tiantian Gong"
    affiliation: "Yale University and The Technion"
    title: "The Curious Case of Relaxed Behavioral Assumptions in Secure Distributed Computing"
    video_url: "https://youtu.be/VK7H5MVQD3g"
    abstract: "Secure distributed protocols often hinge on behavioral assumptions: sufficiently many parties never collude, adversaries stay within fixed thresholds, and behaviors follow idealized models. But what happens when these assumptions no longer hold? In this talk, I will explore how relaxing traditional behavioral assumptions, whether toward rational, malicious, or excessively faulty participants, can open new directions for protocol design. I will present mechanisms that deter covert out-of-band collusion in secure multi-party computation, a recovery framework for state machine replication when there are more faults than classical Byzantine bounds allow, and new approaches to rational secret sharing that overcome long-standing impossibility results. I will also touch on ongoing work toward a framework for composing rational protocols. Taken together, these results highlight how blending cryptographic design with incentive modeling and fault recovery can extend security and resilience beyond the limits of classical theory."
    bio: "Tiantian Gong is a Postdoc at Yale and Technion, working on secure distributed computing."
  - date: "2025-10-03"
    speaker: "Friedhelm Victor"
    affiliation: "TRM Labs"
    title: "Friend or Foe? Identifying Anomalous Peers in Monero's P2P Network"
    abstract: "Monero, the leading privacy-focused cryptocurrency, relies on a peer-to-peer (P2P) network to propagate transactions and blocks. Growing evidence suggests that non-standard nodes exist in the network, posing as honest nodes but are perhaps intended for monitoring the network and spying on other nodes. However, our understanding of the detection and analysis of anomalous peer behavior remains limited. This paper presents a first comprehensive study of anomalous behavior in Monero's P2P network. To this end, we collected and analyzed over 240 hours of network traffic captured from five distinct vantage points worldwide. We further present a formal framework which allows us to analytically define and classify anomalous patterns in P2P cryptocurrency networks. Our detection methodology, implemented as an offline analysis, provides a foundation for real-time monitoring systems. Our analysis reveals the presence of non-standard peers in the network where approximately 14.74% (13.19%) of (reachable) peers in the network exhibit non-standard behavior. These peers exhibit distinct behavioral patterns that might suggest multiple concurrent attacks, pointing to substantial shortcomings in Monero's privacy guarantees and network decentralization. To support reproducibility and enable network operators to protect themselves, we release our examination pipeline to identify and block suspicious peers based on newly captured network traffic."
    bio: "Friedhelm is a Research Scientist at TRM Labs, a blockchain intelligence company that helps financial institutions, businesses and government agencies detect and investigate financial crime and fraud. He has completed a doctoral degree at Technische Universität Berlin in 2022, and has gained several years of experience analyzing financial transaction networks in both traditional finance and modern cryptoasset networks. Most of his research works involve blockchain-based cryptoassets and the Ethereum network. More generally, he is interested in: Complex Network Analysis and Empirical Measurement Studies, Cryptoasset Analytics and Forensics, Financial Crime Detection, Underground Marketplaces, Web and Mobile Privacy, Open Source Intelligence (OSINT). Prior to completing a doctoral degree at Technische Universität Berlin, he has completed a Dual Master Degree in Computer Science at TU Berlin and at the Korea Advanced Institute of Science and Technology."
  - date: "2025-09-26"
    speaker: "Ben Berger"
    affiliation: "Offchain Labs"
    title: "BoLD: Fast and Cheap Dispute Resolution"
    video_url: "https://youtu.be/2Cc2Tc-UyCg"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
      - "https://doi.org/10.4230/LIPIcs.AFT.2024.2"
    abstract: "BoLD is a new dispute resolution protocol that is designed to replace the originally deployed Arbitrum dispute resolution protocol. Unlike that protocol, BoLD is resistant to delay attacks. It achieves this resistance without a significant increase in onchain computation costs and with reduced staking costs."
    bio: "Ben is a research scientist at Offchain Labs, working on blockchain related problems mostly from an economic perspective. Prior to that he was a Ph.D. student at Tel Aviv University, under the supervision of Prof. Michal Feldman. During that time he studied a broad range of problems at the border of Computer Science and Economics. He received his M.Sc. from the Weizmann Institute of Science in 2018, where he was advised by Prof. Zvika Brakerski. During his M.Sc. he worked on Complexity Theory and Cryptography."
  - date: "2025-09-19"
    speaker: "Jacob D. Leshno"
    affiliation: "Chicago Booth School of Business"
    title: "On the Viability of Open-Source Financial Rails: The Economic Security of Permissionless Consensus"
    video_url: "https://youtu.be/nQMvuabaWUc"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
      - "https://arxiv.org/abs/2409.08951"
    abstract: "Bitcoin demonstrated the possibility of a financial ledger that operates without the need for a trusted central authority. However, concerns persist regarding its security and considerable energy consumption. We assess the consensus protocols that underpin Bitcoin's functionality, questioning whether they can ensure economically meaningful security while maintaining a permissionless design that allows free entry of operators. We answer this affirmatively by constructing a protocol that guarantees economic security and preserves Bitcoin's permissionless design. This protocol's security does not depend on monetary payments to miners or immense electricity consumption, which our analysis suggests are ineffective. Our framework integrates economic theory with distributed systems theory, and formalizes the role of the protocol's user community ."
    bio: "Jacob studies market design, using theoretical tools to explore market structures and design effective market rules. His research has been recognized by the ACM SIGecom Test of Time Award and the INFORMS Frederick W. Lanchester Prize. A significant portion of his work focuses on matching markets, such as college admissions and the NRMP medical residency match. His research includes using tractable cutoff characterizations to clarify the structure of these markets and support empirical estimation and design optimization. He also work on cryptocurrencies, Web3, and blockchain technology. This technology allows for a new form of market design in the form of platforms whose rules are given by open-source computer code. His work explores the potential and limitations of these open systems. He taught a PhD class on the economics of distributed systems to bridge computer science theory and economic theory."
  - date: "2025-09-12"
    speaker: "Joachim Neu"
    affiliation: "a16z Crypto Research"
    title: "The Role of Clients in Consensus"
    video_url: "https://youtu.be/iWHQJMmwsn4"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
      - "https://ia.cr/2024/1799"
    abstract: "A specter is haunting consensus protocols—the specter of adversary majority. Dolev and Strong in 1983 showed an early possibility for up to 99% adversaries. Yet, other works show impossibility results for adversaries above 50% under synchrony, seemingly the same setting as Dolev and Strong's. What gives? It is high time that we pinpoint a key culprit for this ostensible contradiction: the modeling details of clients. Are the clients sleepy or always-on? Are they silent or communicating? Can validators be sleepy too? We systematize models for consensus across four dimensions (sleepy/always-on clients, silent/communicating clients, sleepy/always-on validators, and synchrony/partial-synchrony), some of which are new, and tightly characterize the achievable safety and liveness resiliences with matching possibilities and impossibilities for each of the sixteen models. To this end, we unify folklore and earlier results, and fill gaps left in the literature with new protocols and impossibility theorems."
    bio: "I am a post-doc Research Partner at a16z Crypto Research led by Tim Roughgarden. Previously, I earned a PhD from Stanford, advised by David Tse. My current research focus is blockchain-era consensus and decentralized-systems security. My broader interests include distributed computing and systems, applied cryptography, and networking and communications."
  - date: "2025-09-10"
    speaker: "Ariel Gabizon"
    affiliation: "Aztec Labs"
    title: "Revisiting the IPA-sumcheck connection"
    video_url: "https://youtu.be/SPjMJ8kfRSU"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
      - "https://ia.cr/2025/1325"
    abstract: "Inner Product Arguments (IPA) [BCC+16,BBB+17] are a family of proof systems with O(log n) sized proofs, O(n) time verifiers, and transparent setup. Bootle, Chiesa and Sotiraki [BCS21] observed that an IPA can be viewed as a sumcheck protocol [LFKN92] where the summed polynomial is allowed to have coefficients in a group rather than a field. We leverage this viewpoint to improve the performance of multi-linear polynomial commitments based on IPA. Specifically, - We introduce a simplified variant of Halo-style accumulation that works for multilinear evaluation claims, rather than only univariate ones as in [BGH19,BCMS20]. - We show that the size n MSM the IPA verifier performs can be replaced by a ``group variant'' of basefold[ZCF23]. This reduces the verifier complexity from O(n) to O(λ*log^2 n)."
  - date: "2025-09-05"
    speaker: "Grace Jia"
    affiliation: "Yale University"
    title: "Found in Translation: A Generative Language Modeling Approach to Memory Access Pattern Attacks"
    video_url: "https://youtu.be/t5yA_wClxHs"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
      - "https://www.usenix.org/conference/usenixsecurity25/presentation/jia-grace"
    abstract: "Confidential computing environments (CCEs) provide a secure way for privacy-sensitive applications to ensure the confidentiality and integrity of data and computations offloaded to the cloud, relying on a hardware root of trust. However, the cloud provider-controlled Operating System (OS) stack still manages key memory management system services such as paging. Several recent works have demonstrated that these services can leverage side channels, specifically page access patterns, to reconstruct private application data. However, related attacks have primarily targeted applications with simple one-to-one mappings between application-level objects and OS-level pages, which is seldom true for most real-world cloud applications. Moreover, these attacks tend to overlook correlations in access patterns—a common occurrence in most real-world applications—leaving untapped critical side-channel information for improving attack accuracy. We propose a novel attack approach that leverages access correlations across pages in cloud applications using generative language models. Our key insight is that there are strong parallels between application page access patterns and grammatical structures in natural languages, making language modeling an excellent fit for reconstructing sensitive application data with high accuracy. Our attack, named FIT, utilizes a recurrent encoder-decoder architecture to predict application-level object accesses from a sequence of page-level accesses. Our evaluations on popular AI/ML model inference services and semantic search applications show that FIT can predict object-level access sequences with an average accuracy ranging from 71.7% to 99.9%, significantly outperforming prior state-of-the-art approaches."
    bio: "Grace is a third-year PhD student in Computer Science at Yale University, advised by Prof. Anurag Khandelwal. Her research interests are broadly in cloud security, and she is currently focused on data privacy in machine learning and on compute platforms."
  - date: "2025-05-09"
    speaker: "Akaki Mamageishvili"
    affiliation: "Offchain Labs"
    title: "Economic Censorship Games in Fraud Proofs"
    video_url: "https://youtu.be/uVK_VIZrayQ"
    links:
      - "https://doi.org/10.48550/arXiv.2502.20334"
    abstract: "Optimistic rollups rely on fraud proofs -- interactive protocols executed on Ethereum to resolve conflicting claims about the rollup's state -- to scale Ethereum securely. To mitigate against potential censorship of protocol moves, fraud proofs grant participants a significant time window, known as the challenge period, to ensure their moves are processed on chain. Major optimistic rollups today set this period at roughly one week, mainly to guard against strong censorship that undermines Ethereum's own crypto-economic security. However, other forms of censorship are possible, and their implication on optimistic rollup security is not well understood. This paper considers economic censorship attacks, where an attacker censors the defender's transactions by bribing block proposers. At each step, the attacker can either censor the defender -- depleting the defender's time allowance at the cost of the bribe -- or allow the current transaction through while conserving funds for future censorship. We analyze three game theoretic models of these dynamics and determine the challenge period length required to ensure the defender's success, as a function of the number of required protocol moves and the players' available budgets."
    bio: "Akaki has a Ph.D. in theoretical computer science from ETH Zurich. After graduation, he worked as a postdoc and then senior researcher in microeconomics at ETH Zurich. Currently, he is a Senior Research Scientist at Offchain, where he works on optimization and design of rollup protocols."
  - date: "2025-04-25"
    speaker: "Lei Yang"
    affiliation: "MegaLabs"
    title: "Practical Rateless Set Reconciliation"
    video_url: "https://youtu.be/vNHGP4SBGhw"
    links:
      - "https://dl.acm.org/doi/10.1145/3651890.3672219"
    abstract: "Set reconciliation, where two parties hold fixed-length bit strings and run a protocol to learn the strings they are missing from each other, is a fundamental task in many distributed systems. We present Rateless Invertible Bloom Lookup Tables (Rateless IBLT), the first set reconciliation protocol, to the best of our knowledge, that achieves low computation cost and near-optimal communication cost across a wide range of scenarios: set differences of one to millions, bit strings of a few bytes to megabytes, and workloads injected by potential adversaries. Rateless IBLT is based on a novel encoder that incrementally encodes the set difference into an infinite stream of coded symbols, resembling rateless error-correcting codes. We compare Rateless IBLT with state-of-the-art set reconciliation schemes and demonstrate significant improvements. Rateless IBLT achieves 3--4x lower communication cost than non-rateless schemes with similar computation cost, and 2--2000x lower computation cost than schemes with similar communication cost. We show the real-world benefits of Rateless IBLT by applying it to synchronize the state of the Ethereum blockchain, and demonstrate 5.6x lower end-to-end completion time and 4.4x lower communication cost compared to the system used in production."
    bio: "Lei Yang is a cofounder and the CTO of Mega Labs, a startup that is building MegaETH, the first real-time blockchains. He recently finished his PhD on distributed consensus and networking at MIT CSAIL advised by Mohammad Alizadeh. He also holds an SM from MIT and a BS from Peking University on Computer Science."
  - date: "2025-04-18"
    speaker: "Sen Yang"
    affiliation: "Yale"
    title: "DAG-based BFT: Liveness, Safety, and Latency"
    links:
      - "https://eprint.iacr.org/2024/472"
      - "https://eprint.iacr.org/2025/067"
    abstract: "DAG-based Byzantine Fault Tolerant (BFT) protocols offer a path to improved consensus performance by enabling concurrent block proposals and high throughput. In this talk, I will present two recent papers on DAG-based consensus accepted to IEEE S&P 2025. The first paper, \"Constant Latency and Finality for Dynamically Available DAGs,\" explores two types of DAG-based protocols that prioritize either liveness or safety -- one with constant expected latency, providing high-throughput dynamic availability under the sleepy model, and another that ensures safety under network partition. The second paper, \"Sailfish: Towards Improving the Latency of DAG-based BFT,\" introduces a reliable-broadcast (RBC)-based DAG protocol that supports leaders in every RBC round, outperforming the state of the art in terms of latency."
  - date: "2025-04-11"
    speaker: "Fahad Saleh"
    affiliation: "University of Florida"
    title: "An Economic Model of the L1-L2 Interaction"
    abstract: "We provide an economic model of the interaction between a Layer-1 (L1) blockchain and an associated Layer-2 (L2). Our main finding is that, even when the L1 blockchain features value-creating decentralized applications (dApps), there nevertheless exist realistic conditions such that both L1 blockchain investment and L1 cryptoasset market value vanish over time. These results arise when the L2 becomes sufficiently attractive for investment relative to the L1, a situation that would occur if developers focus exclusively on improving L2s while ignoring the L1. Crucially, our results establish that, even if L2s are intended as the primary vehicle for scaling, developers must nonetheless continue to improve the L1 to avoid an adverse outcome for the L1."
    bio: "Fahad is an Associate Professor at the University of Florida and a Visiting Associate Professor at the Massachusetts Institute of Technology. His research focuses primarily on economic analysis associated with permissionless blockchains and differs from work in computer science particularly in that it studies outcomes when investment capital is determined endogenously based on participants being rational investors. Specifically, some of Fahad's work examines blockchain security when mining or staking investments are determined endogenously based on optimal investor behavior. Moreover, other parts of Fahad's work analyzes economic outcomes for decentralized applications (e.g., decentralized exchanges and decentralized lending protocols) and this work determines liquidity endogenously based on the opportunity cost of capital rather than taking liquidity as given. Fahad's work has been published in the top business school journals including Management Science and the Review of Financial Studies. Additionally, Fahad serves on the editorial board of Management Science, is the lead organizer of the Crypto and Blockchain Economic Research (CBER) Forum and is a fellow of the FinTech Initiative at Cornell University. Fahad holds a PhD in Finance from the New York University Stern School of Business. He also holds graduate and undergraduate degrees in engineering from Columbia University and Cornell University respectively."
  - date: "2025-04-04"
    speaker: "Nir Chemaya"
    affiliation: "UC Santa Barbara"
    title: "CLVR Ordering of Transactions on AMMs"
    video_url: "https://youtu.be/PNR2pbGUCT0"
    links:
      - "https://arxiv.org/abs/2408.02634"
    abstract: "Trading on decentralized exchanges via an Automated Market Maker (AMM) mechanism has been massively adopted, with a daily trading volume reaching $1B. This trading method has also received close attention from researchers, central banks, and financial firms, who have the potential to adopt it to traditional financial markets such as foreign exchanges and stock markets. A critical challenge of AMM-powered trading is that transaction order has high financial value, so a policy or method to order transactions in a \"good\" (optimal) manner is vital. We offer economic measures of both price stability (low volatility) and inequality that inform how a \"social planner\" should pick an optimal ordering. We show that there is a trade-off between achieving price stability and reducing inequality, and that policymakers must choose which to prioritize. In addition, picking the optimal order can often be costly, especially when performing an exhaustive search over trade orderings (permutations). As an alternative we provide a simple algorithm, Clever Look-ahead Volatility Reduction (CLVR). This algorithm constructs an ordering which approximately minimizes price volatility with a small computation cost. We also provide insight into the strategy changes that may occur if traders are subject to this sequencing algorithm."
    bio: "Nir is currently a postdoc with Dahlia Malkhi at UC Santa Barbara (UCSB), and an incoming economics professor at Ben-Gurion University. His research interests include finance, blockchain and experimental and behavioral economics."
  - date: "2025-03-28"
    speaker: "Fatima Elsheimy"
    affiliation: "Yale"
    title: "Early Stopping Byzantine Agreement"
    video_url: "https://youtu.be/_BJEcH4yEtI"
    abstract: "Early stopping agreement protocols ensure termination based on the actual number of malicious parties encountered during execution, $f \\leq t$, rather than assuming the worst-case corruption bound of $t < n$. The fundamental lower bound on round complexity for such protocols is $\\min{f+2, t+1}$ rounds. In this talk, I will provide a comprehensive overview of techniques for achieving early stopping in different settings: the information-theoretic setting, which tolerates up to $t < n/3$, and the authenticated setting, which tolerates up to $t < n/2$ and how it can be extended to tolerate $t < n$ corruptions. I will also discuss recent advancements in this area and highlight key open problems that remain unresolved."
  - date: "2025-03-19"
    speaker: "Ferhat Erata"
    affiliation: "Yale"
    title: "Learning Randomized Reductions and Program Properties for Security, Privacy, and Side-Channel Resilience"
    abstract: "Modern computing systems face multifaceted challenges in security, privacy, and leakage resilience. This dissertation makes four key contributions to addressing these challenges. First, it focuses on analyzing side-channel vulnerabilities in low-level cryptographic code and quantum computers using symbolic AI techniques. I introduce novel symbolic register analyses to automatically detect power side-channel vulnerabilities in constant-time cryptographic implementations. Additionally, I demonstrate an algebraic reconstruction method to reverse-engineer quantum circuits from power traces, aiming to extract proprietary information from these circuits. Second, my research explores learning randomized reductions. Informally, a randomized self-reduction allows computing a function’s value at a specific point by evaluating it on randomized inputs. Here, I present a new framework that dynamically infers such properties from implementations using machine learning. Third, the dissertation demonstrates practical applications of these randomized reductions in compiling effective countermeasures against power side-channel and fault injection attacks. It also develops protocols for leakage-resilient machine learning and private quantum computations. Finally, it investigates learning-based methods for partitioning propositional encodings of combinatorial security analysis problems within the cube-and-conquer paradigm, which splits large SAT instances into smaller, more tractable subproblems. We train transformer models to learn branching heuristics within SAT-solving frameworks. Together, these contributions advance automated security analysis and resilience across classical and quantum domains. Advisors: Ruzica Piskac, Jakub Szefer (co-advisor). Committee: Zhong Shao, Shafi Goldwasser (UC Berkeley), Byron Cook (AWS), Scott Shapiro."
  - date: "2025-02-28"
    speaker: "Ertem Nusret Tas"
    affiliation: "Stanford"
    title: "Optimal Security in a Multi-chain World"
    video_url: "https://youtu.be/oj-dwsDzKRc"
    abstract: "Following the invention of Bitcoin, there has been a proliferation of many permissionless blockchains. Each such chain provides a public ledger that can be written to and read from by anyone. In this multi-chain world, a natural question arises: what is the optimal security an existing blockchain, a consumer chain, can extract by only reading from and writing to ‘k’ other existing blockchains, so-called the provider chains? In this talk, we will answer this question in three ways: (1) We will first see a protocol, where an off-the-shelf PBFT-style proof-of-stake protocol (acting as a consumer chain) sends timestamps to Bitcoin (the provider chain) to reduce its stake withdrawal delay and to resolve issues such as non-slashable long-range safety attacks and low liveness resilience. (2) Applying the checkpointing method iteratively, we will then design a protocol called 'interchain timestamping', which enables a consumer chain to extract the maximum economic security from the provider chains, as quantified by the slashable safety resilience. (3) Finally, drawing an analogy with switching circuits, we will design two basic compositional operations between blockchains, serial and triangular compositions, and use these operations as building blocks to construct general overlay blockchains that read from and write to a given set of blockchains. This talk is based on the following papers: 1. Bitcoin-Enhanced Proof-of-Stake Security: Possibilities and Impossibilities (IEEE S&P 2023), 2. Interchain Timestamping for Mesh Security (ACM CCS 2023), 3. A Circuit Approach to Constructing Blockchains on Blockchains (AFT 2024)."
    bio: "Ertem Nusret Tas is a PhD student in Electrical Engineering at Stanford University, working with Prof. David Tse on the analysis of blockchains. He completed both his BS and MEng degrees at the Electrical Engineering and Computer Science department at MIT. His current research focuses on blockchains, consensus protocols and cryptography. He has previously completed summer internships at a16z Crypto Research, BabylonChain, Celestia and Apple. He received a distinguished paper award at ACM CCS 2024, and his papers on blockchains, consensus protocols and cryptography have appeared in top venues such as ACM CCS, IEEE S&P, Financial Cryptography (FC) and Advances in Financial Technologies (AFT)."
  - date: "2025-02-21"
    speaker: "Kirill Nikitin"
    affiliation: "Columbia University & NY Genome Center"
    title: "Private Information Leakage from Polygenic Risk Scores"
    links:
      - "https://nikirill.com"
    abstract: "Polygenic Risk Scores (PRSs) estimate the likelihood of individuals to develop diseases based on their genetic variations. They are commonly considered non-sensitive information and are publicly shared with results of clinical studies or on health forums. In this talk, I will describe how PRSs can be exploited to recover genotypes of individuals and to de-anonymize them. By framing genotype recovery as the subset-sum problem with side information from population statistics, we show that it is possible to reconstruct a significant portion of an individual’s genome from their individual PRS values with 95% accuracy. Even imperfect recovery is then sufficient to identify the individual or their relatives in genealogy databases or public anonymized biobanks."
    bio: "Kirill Nikitin is a postdoctoral researcher at Columbia University and the New York Genome Center working with Gamze Gürsoy on analyzing privacy leakages from genomic data. Previously, he worked as a postdoc with Vitaly Shmatikov at Cornell Tech, and he received his PhD in Computer and Communication Sciences from EPFL, where he was advised by Bryan Ford. Besides genomics privacy, he has worked on metadata protection in encrypted files and communication, private information retrieval, security of software-update systems, and blockchains. Personal website: https://nikirill.com"
  - date: "2025-02-14"
    speaker: "Jiasun Li"
    affiliation: "George Mason University"
    title: "Game Theory in Blockchain Research and My Attempts to Connect to Cryptography"
    video_url: "https://youtu.be/QWOYBzUyOjw"
    abstract: "I plan to divide the talk into two parts. In the first part, I will review my past and ongoing research on applying game theory and mechanism design to blockchain research, highlight two pieces of work: 1. The economic forces that simultaneously compromise and sustain decentralization; 2. The promise of Bitcoin mining to actually lower total carbon emission in the overall economy. In the second half, I will introduce my current interests in incorporating cryptography into mechanism design. I will explain how cryptography may enable the implementation of otherwise infeasible mechanisms, and envision how economic approaches may complement cryptography.If there is extra time (highly unlikely), I can dive in more other work that fall in the same theme."
    bio: "Jiasun Li is currently visiting Yale CS while on sabbatical from associate professor of finance at the Costello College of Business, George Mason University. His research interest is at the intersection of economics and computer science, with focus on applying game theoretical modeling to various blockchain-related topics such as mining, distributed consensus, blockchain scaling, tokenomics. His broader interests encompass empirical studies of the blockchain ecosystem and the application of game theory and mechanism design to other topics such as security design, human-genAI interaction, and traffic control.Dr Li's research has appeared in leading business/finance journals including the Journal of Finance, Review of Financial Studies, and Management Science as well as computer science workshops including ACM Web (WWW) and Financial Cryptography (FC), among others. His ongoing research is supported by grants from the NSF CAREER Award and the Ethereum Foundation, among others. His past work has won the Chicago Quantitative Alliance (CQA) academic paper competition and Yihong Xia Best Paper Award, among other prizes. Besides academic talks at business schools/CS departments, he has also been invited to speak at the Federal Reserve, Securities and Exchange Commission, Department of Homeland Security, and International Monetary Fund (IMF). Dr Li received his Ph.D. in Finance from UCLA Anderson School of Management and B.S. in Mathematics from Fudan University in Shanghai, China."
  - date: "2025-02-07"
    speaker: "Adam O'Neill"
    affiliation: "UMass Amherst"
    title: "Schnorr Signatures are Tightly Secure in the ROM under a Non-Interactive Assumption"
    video_url: "https://youtu.be/WeRQci1XLto"
    links:
      - "https://eprint.iacr.org/2024/1528"
    abstract: "We show that the widely-used Schnorr signature scheme meets existential unforgeability under chosen-message attack (EUF-CMA) in the random oracle model (ROM) if the circular discrete-logarithm (CDL) assumption, a new, non-interactive, and falsifiable variant of DL we introduce, holds in the underlying group. Notably, our reduction is *tight*, meaning the constructed adversary against CDL has essentially the same running time and success probability as the assumed forger. Tightness is essential for justifying the key length used in practice. To our knowledge, we are the first to exhibit such a reduction to even a non-interactive assumption. We justify CDL by showing it is as hard as DL in two carefully chosen idealized models, which idealize different aspects of the assumption."
    bio: "Adam O’Neill is an Assistant Professor in the Manning College of Information and Computer Sciences at the University of Massachusetts, Amherst. Previously, he was an Assistant Professor of Computer Science at Georgetown University. He received his Ph.D. in Computer Science at the Georgia Institute of Technology and held postdoctoral appointments at the University of Texas at Austin and Boston University. His doctoral work was recognized with the CRYPTO 2022 Test-of-Time Award."
  - date: "2025-01-31"
    speaker: "Gustavo Grivol"
    affiliation: "NYU Stern"
    title: "Optimal Arbitrage Timing between Decentralized and Centralized Exchanges"
    video_url: "https://youtu.be/0gQSOcRpue8"
    links:
      - "https://eprint.iacr.org/2024/1528"
      - "https://pages.stern.nyu.edu/~jreed/papers/paper28.pdf"
    abstract: "In this work, we try to map how arbitrage between decentralized and centralized exchanges can create incentives for reducing or increasing latency in blockchains. Under specific price dynamics, we demonstrate that arbitrage opportunities may incentivize block producers to delay releasing a new block until certain price deviations occur. In other price dynamics, latency strategies may even become irrelevant. We not only analyze price dynamics but also examine how factors such as transaction fees, interest rates, and the blockchain consensus mechanism shape different timing strategies. To support the model and results, we developed a more flexible framework for stopping time policies in blockchains and characterized the profit function for arbitrage in Constant Function Market Makers. To empirically assess these incentives, we examine data on Multi-Block Maximal Extractable Value (MEV), a scenario that allows more sophisticated timing strategies."
    bio: "Gustavo Grivol is an Operations Management Ph.D. student at NYU Stern, advised by Prof. Hanna Halaburda and Prof. Josh Reed. His research focuses on applications of stochastic processes in decision making and platform design. His research interests also include social networks and blockchains."
  - date: "2024-12-13"
    speaker: "Grace Jia"
    affiliation: "Yale"
    title: "Length Leakage in Oblivious Data Access Mechanisms"
    abstract: "This paper explores the problem of preventing length leakage in oblivious data access mechanisms with passive persistent adversaries. We show that designing mechanisms that prevent both length leakage and access pattern leakage requires navigating a three-way tradeoff between storage footprint, bandwidth footprint, and the information leaked to the adversary. We establish powerful lower bounds on achievable storage and bandwidth footprints for a variety of leakage profiles, and present constructions that perfectly or near-perfectly match the lower bounds."
  - date: "2024-12-06"
    speaker: "Aviv Yaish"
    affiliation: "Yale"
    title: "Transaction Fee Mechanisms: Theory & Practice"
    links:
      - "https://dl.acm.org/doi/10.1145/3670865.3673469"
      - "https://www.usenix.org/conference/usenixsecurity24/presentation/yaish"
      - "https://doi.org/10.48550/arXiv.2210.07793"
      - "https://aviv.yai.sh/ec24tutorialtfms"
      - "https://doi.org/10.48550/arXiv.2402.08549"
    abstract: "In a series of works, we study Transaction Fee Mechanisms (TFMs), which determine how much fees user transactions have to pay to be processed, and the amount of fees miners can collect as revenue. We tackle the question of whether one can design \"perfect\" TFMs, and prove the elegant prior work does not fully address it due to relying on stricter definitions than the canonical ones. We also prove that two TFMs satisfy relaxations of the canonical definitions while enjoying good revenue. We go beyond the myopic setting of prior work and consider transactions that can expire, presenting a novel allocation strategy which outperforms the myopic greedy strategy's revenue."
    bio: "Aviv researches the economics and security of distributed systems. He is a postdoc at Yale, where he is grateful for being hosted by Prof. Fan Zhang, and co-hosted by Profs. Ben Fisch, Charalampos (Babis) Papamanthou, and Zhong Shao. He is also a visiting researcher at Innsbruck University, graciously hosted by Prof. Rainer Böhme. Previously, he had the pleasure of doing a PhD with Prof. Aviv Zohar at HUJI, where he also was a lecturer for two courses and received a teaching award. Among other honors, the CBER Forum named him one of the top PhD graduates of 23-24, and he received the CCS Distinguished Paper award, the CBER Best Paper award, two Ethereum Foundation grants, the AIANI and Ze'ev Jabotinsky fellowships, and HUJI's rector award for first-in-class MSc students."
