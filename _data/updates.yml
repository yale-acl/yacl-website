- date: "2026-05-05"
  tag: paper
  text: |
    Four papers by YACL members Hadas Zeilberger, Zeyu Liu, and Fatima Elsheimy were accepted to [Crypto 2026](https://crypto.iacr.org/2026/)
    - [Khatam: Proximity Gaps in Multilinear IOPs for All Linear Codes](https://eprint.iacr.org/2024/1843)
    - New Techniques for Fast and Shallow FHEW/TFHE Bootstrapping
    - [Optimal Best-of-Both-Worlds Consensus](https://eprint.iacr.org/2026/239)
    - [SIMD HSS and aHMAC from Interval Encoding with Application to One-Bit-Per-Gate Garbling](https://eprint.iacr.org/2026/485)
  
- date: "2026-04-29"
  tag: paper
  text: |
    Six papers by YACL members were accepted to ACM CCS 2026 (including papers accepted with shepherding):
    - [Censorship Resistance vs Throughput in Multi-Proposer BFT Protocols](https://eprint.iacr.org/2026/126)
    - [Designated-Verifier Dynamic zk-SNARKs with Applications to Dynamic Proofs of Index](https://eprint.iacr.org/2026/144)
    - [Insecurity Through Obscurity: Veiled Vulnerabilities in Closed-Source Contracts](https://arxiv.org/abs/2504.13398)
    - [TACITA: Threshold Aggregation without Client Interaction](https://eprint.iacr.org/2025/1579.pdf)
    - Relect: Single Secret Leader Election via FHE with Reduced Computation and Communication and Transparent Setup
    - UnifOMR: Oblivious Message Retrieval with Near-optimal Concrete Efficiency

