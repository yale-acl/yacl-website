name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "assets/**"
      - "index.md"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "_config.yml"
      - "_data/**"
      - "_includes/**"
      - "_layouts/**"
      - "_pages/**"
      - "assets/**"
      - "index.md"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

  deploy:
    needs: build
    if: github.event_name == 'push'
    environment: production
    runs-on:
      - self-hosted
      - yacl-deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Deploy to cs-www
        env:
          REMOTE_USER: ${{ secrets.YACL_REMOTE_USER }}
        run: ./deploy-cs.sh
